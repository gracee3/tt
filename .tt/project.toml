schema = "tt-managed-project-config-v1"
title = "tt"
objective = "Coordinate dev, test, and integration work for tt"
base_branch = "main"
branch_prefix = "tt"
tt_runtime_bin = "./target/debug/tt-cli"
plan_first = true
commit_policy = "checkpoint-enforced"
require_operator_merge_approval = true
expected_long_build = false
require_progress_updates = true
soft_silence_seconds = 900
hard_ceiling_seconds = 7200
default_validation_commands = ["cargo test"]
smoke_validation_commands = ["cargo check"]
checkpoint_triggers = [
    "after_plan",
    "after_develop",
    "after_test",
    "before_merge",
]
pitfalls = []
hints = []
exceptions = []
